<section id="hero">
  <div class="hero-bg">
    <div class="grid-lines"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="hero-content">
    <div class="hero-tag">{{ profile?.tagline }}</div>

    <h1 class="hero-name">
      Anant<br>Saxena
    </h1>

    <div class="hero-role">
      <span class="typed">{{ typedText }}</span>
    </div>

    <p class="hero-desc">{{ profile?.desc }}</p>

    <div class="hero-btns">
      <a class="btn-primary" (click)="scrollTo('projects')" appMagnetic [magneticPull]="30">View My Work</a>
      <a class="btn-outline" (click)="scrollTo('contact')" appMagnetic>Let's Connect</a>
    </div>
  </div>

  <div class="hero-scroll">
    <div class="scroll-line"></div>
    <span class="scroll-text">scroll</span>
  </div>
</section>
