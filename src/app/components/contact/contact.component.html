<section id="contact">
  <div class="section-tag">06. Contact</div>
  <div class="section-title">Let's <span>work</span><br>together</div>

  <div class="contact-grid">

    <!-- Info side -->
    <div class="contact-info fade-in">
      <h3>Get in touch</h3>
      <p>I'm currently open to new opportunities — full time, freelance, or interesting collaborations.
         Drop a message and I'll get back to you within 24 hours.</p>

      <div class="contact-items">
        <a [href]="'mailto:' + profile?.email" class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div>
            <div class="contact-detail">email</div>
            <div class="contact-val">{{ profile?.email }}</div>
          </div>
        </a>

        

        <a [href]="profile?.linkedin" target="_blank" class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </div>
          <div>
            <div class="contact-detail">linkedin</div>
            <div class="contact-val">anant-saxena-1904</div>
          </div>
        </a>

        <a [href]="profile?.github" target="_blank" class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </div>
          <div>
            <div class="contact-detail">github</div>
            <div class="contact-val">anantsaxena54</div>
          </div>
        </a>
      </div>
    </div>

    <!-- Form side -->
    <div class="fade-in">
      <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">your name</label>
            <input id="name" name="name" type="text" placeholder="John Doe"
                   [(ngModel)]="form.name" required />
          </div>
          <div class="form-group">
            <label for="email">your email</label>
            <input id="email" name="email" type="email" placeholder="john@example.com"
                   [(ngModel)]="form.email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="subject">subject</label>
          <input id="subject" name="subject" type="text" placeholder="Job opportunity / Collaboration"
                 [(ngModel)]="form.subject" required />
        </div>

        <div class="form-group">
          <label for="message">message</label>
          <textarea id="message" name="message" placeholder="Tell me about the opportunity..."
                    [(ngModel)]="form.message" required rows="5"></textarea>
        </div>

        <div class="form-msg" *ngIf="formStatus !== 'idle'"
             [class.success]="formStatus === 'success'"
             [class.error]="formStatus === 'error'">
          {{ formMsg }}
        </div>

        <button type="submit" class="submit-btn" [disabled]="sending || contactForm.invalid" appMagnetic [magneticPull]="10">
          {{ sending ? 'sending...' : 'send message →' }}
        </button>
      </form>
    </div>

  </div>
</section>
